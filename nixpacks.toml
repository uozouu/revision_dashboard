[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "file",
  "gcc",
  "gnumake",
  "openssl",
  "libffi"
]

[phases.install]
cmds = [
  "cd Backend",
  "pip install --upgrade pip setuptools wheel",
  "pip install -r requirements.txt"
]

[start]
cmd = "cd Backend && bash ../start.sh"

[variables]
PYTHONUNBUFFERED = "1"
